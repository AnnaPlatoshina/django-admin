<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список сотрудников</title>
</head>
<body>
    <h1>Сотрудники</h1>
    <ul>
        {% for employee in employees %}
            <li>{{ employee.first_name }} {{ employee.last_name }} — {{ employee.username }}</li>
        {% empty %}
            <li>Сотрудников нет.</li>
        {% endfor %}
    </ul>
</body>
</html>
