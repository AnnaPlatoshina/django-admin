{% extends "base.html" %}

{% block content %}
  <h1>Список сотрудников</h1>
  <ul>
    {% for employee in employees %}
      <li>
        <a href="{% url 'employee_detail' employee.pk %}">
          {{ employee.name }}
        </a>
      </li>
    {% empty %}
      <li>Нет сотрудников</li>
    {% endfor %}
  </ul>
{% endblock %}
